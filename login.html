<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="img/logo.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar – GENIUS Hortifruit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="header-placeholder"></div>
<div id="toast-container"></div>

<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon"><img src="img/logo.png" alt="GENIUS logo" style="height:40px;width:40px;object-fit:contain;" /></div>
      <h2>GENIUS Hortifruit</h2>
      <p style="color:var(--cinza-600); font-size:0.875rem; margin-top:0.25rem;">Mercado Inteligente</p>
    </div>

    <!-- ABAS -->
    <div class="tabs">
      <button class="tab-btn ativo" id="tab-login" onclick="setModo('login')">Entrar</button>
      <button class="tab-btn" id="tab-cadastro" onclick="setModo('cadastro')">Cadastrar</button>
    </div>

    <!-- ============ FORM LOGIN ============ -->
    <div class="tab-content ativo" id="form-login">
      <form id="formLogin" novalidate>

        <div class="form-group input-icone">
          <label for="login-email">E-mail</label>
          <span class="icone">📧</span>
          <input type="email" id="login-email" placeholder="seu@email.com" value="joao@email.com" required />
        </div>

        <div class="form-group input-icone">
          <label for="login-senha">Senha</label>
          <span class="icone">🔒</span>
          <input type="password" id="login-senha" placeholder="Mínimo 6 caracteres" value="senha123" required />
        </div>

        <div id="erro-login" class="alerta alerta-vermelho" style="display:none;"></div>

        <button type="submit" class="btn btn-verde btn-full btn-lg" style="margin-top:0.5rem;">
          Entrar
        </button>

        <div style="text-align:center; margin-top:1.25rem; font-size:0.875rem; color:var(--cinza-600);">
          Usuário demo: <strong>joao@email.com</strong> / <strong>senha123</strong>
        </div>
      </form>
    </div>

    <!-- ============ FORM CADASTRO ============ -->
    <div class="tab-content" id="form-cadastro">

      <!-- Indicador de etapas -->
      <div class="etapas">
        <div class="etapa-dot ativo" id="etapa-1">1</div>
        <div class="etapa-linha" id="linha-1"></div>
        <div class="etapa-dot" id="etapa-2">2</div>
      </div>

      <!-- Etapa 1: Dados de acesso -->
      <div id="step-1">
        <h3 style="font-weight:700; margin-bottom:1.25rem; font-size:0.95rem; color:var(--cinza-600);">Etapa 1 – Dados de Acesso</h3>

        <div class="form-group input-icone">
          <label for="cad-nome">Nome completo *</label>
          <span class="icone">👤</span>
          <input type="text" id="cad-nome" placeholder="Seu nome completo" />
        </div>

        <div class="form-group input-icone">
          <label for="cad-email">E-mail *</label>
          <span class="icone">📧</span>
          <input type="email" id="cad-email" placeholder="seu@email.com" />
        </div>

        <div class="form-group input-icone">
          <label for="cad-senha">Senha *</label>
          <span class="icone">🔒</span>
          <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" />
        </div>

        <div class="form-group input-icone">
          <label for="cad-conf-senha">Confirmar senha *</label>
          <span class="icone">🔒</span>
          <input type="password" id="cad-conf-senha" placeholder="Repita a senha" />
        </div>

        <div id="erro-step1" class="alerta alerta-vermelho" style="display:none;"></div>

        <button type="button" class="btn btn-verde btn-full btn-lg" id="btn-proxima-etapa">
          Próxima Etapa →
        </button>
      </div>

      <!-- Etapa 2: Dados pessoais -->
      <div id="step-2" style="display:none;">
        <h3 style="font-weight:700; margin-bottom:1.25rem; font-size:0.95rem; color:var(--cinza-600);">Etapa 2 – Dados Pessoais</h3>

        <div class="form-row">
          <div class="form-group input-icone">
            <label for="cad-cpf">CPF *</label>
            <span class="icone">🪪</span>
            <input type="text" id="cad-cpf" placeholder="000.000.000-00" maxlength="14" />
          </div>
          <div class="form-group input-icone">
            <label for="cad-tel">Telefone *</label>
            <span class="icone">📱</span>
            <input type="text" id="cad-tel" placeholder="(00) 00000-0000" maxlength="15" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cad-cep">CEP *</label>
            <input type="text" id="cad-cep" placeholder="00000-000" maxlength="9" />
          </div>
          <div class="form-group">
            <label for="cad-num">Número *</label>
            <input type="text" id="cad-num" placeholder="Ex: 100" />
          </div>
        </div>

        <div class="form-group">
          <label for="cad-rua">Rua *</label>
          <input type="text" id="cad-rua" placeholder="Nome da rua" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cad-bairro">Bairro *</label>
            <input type="text" id="cad-bairro" placeholder="Bairro" />
          </div>
          <div class="form-group">
            <label for="cad-cidade">Cidade *</label>
            <input type="text" id="cad-cidade" placeholder="Cidade" />
          </div>
        </div>

        <div class="form-group">
          <label for="cad-comp">Complemento</label>
          <input type="text" id="cad-comp" placeholder="Apto, Bloco... (opcional)" />
        </div>

        <div id="erro-step2" class="alerta alerta-vermelho" style="display:none;"></div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
          <button type="button" class="btn btn-cinza" id="btn-voltar-etapa">← Voltar</button>
          <button type="button" class="btn btn-verde" id="btn-finalizar-cad">✅ Finalizar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/header.js"></script>
<script src="js/app.js"></script>
<script>
  renderHeader('');

  // Redireciona se já logado
  if (Auth.logado()) window.location.href = 'cliente.html';

  function setModo(modo) {
    document.getElementById('tab-login').classList.toggle('ativo', modo === 'login');
    document.getElementById('tab-cadastro').classList.toggle('ativo', modo === 'cadastro');
    document.getElementById('form-login').classList.toggle('ativo', modo === 'login');
    document.getElementById('form-cadastro').classList.toggle('ativo', modo === 'cadastro');
  }

  // LOGIN
  document.getElementById('formLogin').addEventListener('submit', async e => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    const erroDiv = document.getElementById('erro-login');

    try {
      const usuario = await Api.post('/login', { email, senha });
      erroDiv.style.display = 'none';
      Auth.salvar(usuario);
      mostrarToast(`✅ Bem-vindo(a), ${usuario.nome}!`, 'verde');
      setTimeout(() => window.location.href = usuario.admin ? 'admin.html' : 'cliente.html', 1000);
    } catch (err) {
      erroDiv.style.display = 'flex';
      try { erroDiv.textContent = '❌ ' + JSON.parse(err.message).erro; }
      catch { erroDiv.textContent = '❌ E-mail ou senha incorretos'; }
    }
  });

  // CADASTRO
  // Máscara CPF
  document.getElementById('cad-cpf').addEventListener('input', e => {
    e.target.value = formatarCPF(e.target.value);
  });

  document.getElementById('cad-tel').addEventListener('input', e => {
    e.target.value = formatarTelefone(e.target.value);
  });

  document.getElementById('cad-cep').addEventListener('input', e => {
    e.target.value = formatarCEP(e.target.value);
    if (e.target.value.replace(/\D/g,'').length === 8) buscarCEP(e.target.value);
  });

  async function buscarCEP(cep) {
    try {
      const resp = await fetch(`https://viacep.com.br/ws/${cep.replace(/\D/g,'')}/json/`);
      const data = await resp.json();
      if (!data.erro) {
        document.getElementById('cad-rua').value = data.logradouro || '';
        document.getElementById('cad-bairro').value = data.bairro || '';
        document.getElementById('cad-cidade').value = data.localidade || '';
        document.getElementById('cad-num').focus();
      }
    } catch(e) {}
  }

  // Avança etapa 1 → 2
  document.getElementById('btn-proxima-etapa').addEventListener('click', () => {
    const nome  = document.getElementById('cad-nome').value.trim();
    const email = document.getElementById('cad-email').value.trim();
    const senha = document.getElementById('cad-senha').value;
    const conf  = document.getElementById('cad-conf-senha').value;
    const erroDiv = document.getElementById('erro-step1');

    if (nome.length < 3) return mostrarErro(erroDiv, 'Nome deve ter pelo menos 3 caracteres');
    if (!email.includes('@')) return mostrarErro(erroDiv, 'E-mail inválido');
    if (senha.length < 6) return mostrarErro(erroDiv, 'Senha deve ter pelo menos 6 caracteres');
    if (senha !== conf) return mostrarErro(erroDiv, 'As senhas não coincidem!');

    erroDiv.style.display = 'none';
    document.getElementById('step-1').style.display = 'none';
    document.getElementById('step-2').style.display = 'block';
    document.getElementById('etapa-1').textContent = '✓';
    document.getElementById('etapa-1').classList.remove('ativo');
    document.getElementById('etapa-1').classList.add('concluido');
    document.getElementById('etapa-2').classList.add('ativo');
    document.getElementById('linha-1').classList.add('ativo');
  });

  document.getElementById('btn-voltar-etapa').addEventListener('click', () => {
    document.getElementById('step-2').style.display = 'none';
    document.getElementById('step-1').style.display = 'block';
    document.getElementById('etapa-1').textContent = '1';
    document.getElementById('etapa-1').classList.add('ativo');
    document.getElementById('etapa-1').classList.remove('concluido');
    document.getElementById('etapa-2').classList.remove('ativo');
    document.getElementById('linha-1').classList.remove('ativo');
  });

  document.getElementById('btn-finalizar-cad').addEventListener('click', async () => {
    const rua    = document.getElementById('cad-rua').value.trim();
    const num    = document.getElementById('cad-num').value.trim();
    const bairro = document.getElementById('cad-bairro').value.trim();
    const cidade = document.getElementById('cad-cidade').value.trim();
    const cep    = document.getElementById('cad-cep').value.trim();
    const tel    = document.getElementById('cad-tel').value.trim();
    const cpf    = document.getElementById('cad-cpf').value.trim();
    const erroDiv = document.getElementById('erro-step2');

    if (!rua || !num || !bairro || !cidade || !cep) return mostrarErro(erroDiv, 'Preencha todos os campos obrigatórios do endereço');
    if (cep.replace(/\D/g,'').length !== 8) return mostrarErro(erroDiv, 'CEP inválido (8 dígitos)');
    if (tel.replace(/\D/g,'').length < 10) return mostrarErro(erroDiv, 'Telefone inválido');

    const novoUsuario = {
      nome: document.getElementById('cad-nome').value.trim(),
      email: document.getElementById('cad-email').value.trim(),
      senha: document.getElementById('cad-senha').value,
      cpf, telefone: tel, rua, numero: num,
      bairro, cidade, cep,
      complemento: document.getElementById('cad-comp').value
    };

    try {
      const usuarioCriado = await Api.post('/cadastrar', novoUsuario);
      Auth.salvar(usuarioCriado);
      mostrarToast(`🎉 Cadastro realizado! Bem-vindo(a), ${usuarioCriado.nome}!`, 'verde');
      setTimeout(() => window.location.href = 'cliente.html', 1200);
    } catch (err) {
      try { mostrarErro(erroDiv, JSON.parse(err.message).erro); }
      catch { mostrarErro(erroDiv, 'Erro ao cadastrar. Tente novamente.'); }
    }
  });

  function mostrarErro(div, msg) {
    div.style.display = 'flex';
    div.textContent = '❌ ' + msg;
  }
</script>
</body>
</html>
